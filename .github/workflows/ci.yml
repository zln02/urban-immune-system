name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint-and-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          pip install -r prototype/requirements.txt

      - name: Lint
        run: flake8 prototype/app.py --max-line-length=100

      - name: Import smoke test
        run: python -c "import importlib.util; spec = importlib.util.spec_from_file_location('app', 'prototype/app.py'); module = importlib.util.module_from_spec(spec); spec.loader.exec_module(module)"
