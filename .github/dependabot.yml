version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python
  - package-ecosystem: pip
    directory: "/backend"
    schedule:
      interval: weekly
    labels:
      - dependencies
      - backend
  - package-ecosystem: npm
    directory: "/frontend"
    schedule:
      interval: weekly
    labels:
      - dependencies
      - frontend
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    labels:
      - ci
