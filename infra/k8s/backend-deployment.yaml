apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: urban-immune
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: gcr.io/PROJECT_ID/uis-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: uis-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: urban-immune
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
