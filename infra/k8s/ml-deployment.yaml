apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml
  namespace: urban-immune
  labels:
    app: ml
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ml
  template:
    metadata:
      labels:
        app: ml
    spec:
      containers:
        - name: ml
          image: gcr.io/PROJECT_ID/uis-ml:latest
          ports:
            - containerPort: 8001
          envFrom:
            - secretRef:
                name: uis-secrets
          volumeMounts:
            - name: model-storage
              mountPath: /app/checkpoints
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
      volumes:
        - name: model-storage
          persistentVolumeClaim:
            claimName: model-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: ml
  namespace: urban-immune
spec:
  selector:
    app: ml
  ports:
    - port: 8001
      targetPort: 8001
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: model-pvc
  namespace: urban-immune
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
