apiVersion: apps/v1
kind: Deployment
metadata:
  name: pipeline
  namespace: urban-immune
  labels:
    app: pipeline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pipeline
  template:
    metadata:
      labels:
        app: pipeline
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: pipeline
          image: gcr.io/PROJECT_ID/uis-pipeline:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: uis-secrets
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "400m"
              memory: "512Mi"
