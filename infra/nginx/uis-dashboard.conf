# Urban Immune System 대시보드 외부 노출 (Basic Auth)
# 외부 :80 → 내부 127.0.0.1:3000 (Next.js, loopback 유지)
server {
    listen 80;
    server_name REDACTED-HOST _;

    # 접근/에러 로그 (ISMS-P 접근통제 증적)
    access_log /var/log/nginx/uis_access.log;
    error_log  /var/log/nginx/uis_error.log;

    auth_basic           "Urban Immune System";
    auth_basic_user_file /etc/nginx/.uis_htpasswd;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        # SSE(/api/v1/alerts/stream) 실시간 스트림 끊김 방지
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
    }
}
