# Urban Immune System — ML 모델 설정

autoencoder:
  input_dim: 4          # L1, L2, L3, AUX
  latent_dim: 16
  epochs: 50
  lr: 0.001
  batch_size: 32
  threshold_percentile: 95.0

xgboost:
  n_estimators: 200
  max_depth: 4
  learning_rate: 0.05
  subsample: 0.8
  min_samples_leaf: 5
  random_state: 42
  cv_splits: 5
  cv_gap: 4                   # 주 단위 갭 (미래 누출 방지)

tft:
  # synth (24, 3) / real (12, 2) — train_real.py 가 D-5 안정화 후 12/2 사용
  # 데이터 26주 한계로 real 은 (12, 2) 로 축소. 데이터 누적 후 (24, 3) 재시도.
  max_encoder_length: 12    # 과거 12주 (real 학습 기준)
  max_prediction_length: 2  # 1/2주 후 예측 = 7/14일
  hidden_size: 32           # 26주 데이터에 맞춰 capacity 축소 (synth 64 → real 32)
  attention_head_size: 4
  dropout: 0.1
  hidden_continuous_size: 12  # capacity 동조 (synth 16 → real 12)
  learning_rate: 0.0003
  max_epochs: 50
  gradient_clip_val: 0.1

llm:
  provider: openai            # env LLM_PROVIDER로 override 가능
  model: gpt-4o-mini          # env OPENAI_MODEL / ANTHROPIC_MODEL 우선 적용
  max_tokens: 1024
  temperature: 0.3

rag:
  embed_model: "sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2"
  vector_dim: 384
  collection: epidemiology_docs   # Qdrant 컬렉션명 — 임의 변경 금지
  top_k: 5

alert:
  thresholds:
    green:  [0, 30]
    yellow: [30, 55]
    orange: [55, 75]
    red:    [75, 100]
