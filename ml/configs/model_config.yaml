# Urban Immune System — ML 모델 설정

autoencoder:
  input_dim: 4          # L1, L2, L3, AUX
  latent_dim: 16
  epochs: 50
  lr: 0.001
  batch_size: 32
  threshold_percentile: 95.0

xgboost:
  n_estimators: 200
  max_depth: 4
  learning_rate: 0.05
  subsample: 0.8
  min_samples_leaf: 5
  random_state: 42
  cv_splits: 5
  cv_gap: 4                   # 주 단위 갭 (미래 누출 방지)

tft:
  max_encoder_length: 24    # 과거 24주
  max_prediction_length: 3  # 최대 3주 예측
  hidden_size: 64
  attention_head_size: 4
  dropout: 0.1
  hidden_continuous_size: 16
  learning_rate: 0.0003
  max_epochs: 50
  gradient_clip_val: 0.1

llm:
  provider: openai            # env LLM_PROVIDER로 override 가능
  model: gpt-4o-mini          # env OPENAI_MODEL / ANTHROPIC_MODEL 우선 적용
  max_tokens: 1024
  temperature: 0.3

rag:
  embed_model: "sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2"
  vector_dim: 384
  collection: epidemiology_docs   # Qdrant 컬렉션명 — 임의 변경 금지
  top_k: 5

alert:
  thresholds:
    green:  [0, 30]
    yellow: [30, 55]
    orange: [55, 75]
    red:    [75, 100]
