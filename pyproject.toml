[project]
name = "urban-immune-system"
version = "0.2.0"
requires-python = ">=3.11"
dependencies = [
    "streamlit>=1.30",
    "pandas>=2.0",
    "numpy>=1.24",
    "plotly>=5.18",
    "folium>=0.15",
    "streamlit-folium>=0.18",
]

[project.optional-dependencies]
backend = [
    "fastapi>=0.110",
    "uvicorn[standard]>=0.27",
    "pydantic-settings>=2.1",
    "asyncpg>=0.29",
    "sqlalchemy[asyncio]>=2.0",
]
pipeline = [
    "confluent-kafka>=2.3",
    "httpx>=0.27",
    "pdfplumber>=0.11",
    "apscheduler>=3.10",
]
ml = [
    "torch>=2.2",
    "pytorch-forecasting>=1.0",
    "pytorch-lightning>=2.2",
    "scikit-learn>=1.4",
    "qdrant-client>=1.7",
    "langchain>=0.1",
    "openai>=1.10",
]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "pytest-asyncio>=0.23",
    "ruff>=0.3",
    "mypy>=1.8",
    "pre-commit>=3.6",
]
all = [
    "urban-immune-system[backend,pipeline,ml,dev]",
]

[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short --cov=src --cov=backend --cov-report=term-missing"

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
strict = false
